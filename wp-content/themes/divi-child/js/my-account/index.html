<style>
  .my-account-card-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
    padding: 0 90px;
  }

  .my-account-card {
    aspect-ratio: 1 / 1;
    border-radius: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-decoration: none;
    text-align: center;
    box-sizing: border-box;
  }

  .my-account-card__content {
    width: 100%;
    display: grid;
    justify-items: center;
    align-content: center;
    row-gap: 18px;
  }

  .my-account-card__icon-wrap {
    width: 100px;
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .my-account-card__icon {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }

  .my-account-card__label {
    height: 2.8em;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: "Poppins", Helvetica, Arial, Lucida, sans-serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.4;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  .my-account-card--edit-profile {
    background: #00b4ef;
    color: #ffffff;
  }

  .my-account-card--statements {
    background: #ffffff;
    color: #00b4ef;
    border: 1px solid #d9eef7;
  }

  .my-account-card--subscriptions {
    background: #000000;
    color: #ffffff;
  }

  .my-account-card--baptism {
    background: #ffffff;
    color: #00b4ef;
    border: 1px solid #d9eef7;
  }

  @media (max-width: 980px) {
    .my-account-card-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      padding: 0 64px;
    }

    .my-account-card {
      padding: 20px;
    }

    .my-account-card__icon-wrap {
      width: 120px;
      height: 120px;
    }

    .my-account-card__label {
      font-size: 16px;
      height: 3em;
    }
  }

  @media (max-width: 480px) {
    .my-account-card-grid {
      gap: 12px;
      padding: 0 32px;
    }

    .my-account-card {
      padding: 16px;
      border-radius: 44px;
    }

    .my-account-card__icon-wrap {
      width: 64px;
      height: 64px;
    }

    .my-account-card__label {
      font-size: 12px;
      height: 3.2em;
    }
  }
</style>


<div class="my-account-card-grid">
	<div class="my-account-card my-account-card--edit-profile">
		<div class="my-account-card__content">
			<div class="my-account-card__icon-wrap">
				<img
					class="my-account-card__icon"
					src="https://calvary2024stg.wpenginepowered.com/wp-content/uploads/2026/02/edit-profile-icon.png"
					alt="Edit Profile"
				>
			</div>
			<div class="my-account-card__label">EDIT PROFILE</div>
		</div>
	</div>

	<div class="my-account-card my-account-card--statements">
		<div class="my-account-card__content">
			<div class="my-account-card__icon-wrap">
				<img
					class="my-account-card__icon"
					src="https://calvary2024stg.wpenginepowered.com/wp-content/uploads/2026/02/statements.png"
					alt="Statements"
				>
			</div>
			<div class="my-account-card__label">STATEMENTS</div>
		</div>
	</div>

	<div class="my-account-card my-account-card--subscriptions">
		<div class="my-account-card__content">
			<div class="my-account-card__icon-wrap">
				<img
					class="my-account-card__icon"
					src="https://calvary2024stg.wpenginepowered.com/wp-content/uploads/2026/02/subscriptions.png"
					alt="Subscriptions"
				>
			</div>
			<div class="my-account-card__label">SUBSCRIPTIONS</div>
		</div>
	</div>

	<div class="my-account-card my-account-card--baptism">
		<div class="my-account-card__content">
			<div class="my-account-card__icon-wrap">
				<img
					class="my-account-card__icon"
					src="https://calvary2024stg.wpenginepowered.com/wp-content/uploads/2026/02/Milestone.png"
					alt="Baptism Certificate"
				>
			</div>
			<div class="my-account-card__label">BAPTISM CERTIFICATE</div>
		</div>
	</div>
</div>
