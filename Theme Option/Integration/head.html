<script>
  (function () {
    var HOST_SELECTOR = "mpp-event-details";
    var STYLE_ID = "ccfl-shadow-backlink-style";
    var CUSTOM_CLASS = "ccfl-custom-all-events";

    function injectShadowStyle(root) {
      if (!root || root.getElementById(STYLE_ID)) {
        return;
      }

      var style = document.createElement("style");
      style.id = STYLE_ID;
      style.textContent =
        ".mpp-innerpage--back." +
        CUSTOM_CLASS +
        " > a{display:inline-flex!important;align-items:center!important;gap:8px!important;padding:8px 14px!important;border:1px solid #000!important;border-radius:9999px!important;background:#fff!important;color:#000!important;text-decoration:none!important;font-size:14px!important;line-height:1!important;}" +
        ".mpp-innerpage--back." +
        CUSTOM_CLASS +
        " > a .mppw-arrow.back{color:#000!important;border-color:#000!important;}" +
        ".mpp-innerpage--back." +
        CUSTOM_CLASS +
        " > a:hover{background:#f3f3f3!important;}" +
        ".ccfl-event-headline{display:flex!important;align-items:center!important;gap:14px!important;margin:14px 0 10px!important;}" +
        ".ccfl-event-date-badge{width:clamp(56px,9vw,70px)!important;height:clamp(56px,9vw,70px)!important;border-radius:9999px!important;background:#000!important;color:#fff!important;display:flex!important;flex-direction:column!important;align-items:center!important;justify-content:center!important;flex:0 0 auto!important;line-height:1!important;}" +
        ".ccfl-event-date-month{text-transform:uppercase!important;font-size:11px!important;font-weight:700!important;letter-spacing:.08em!important;}" +
        ".ccfl-event-date-day{font-size:24px!important;font-weight:700!important;margin-top:2px!important;}" +
        ".ccfl-event-title-wrap{min-width:0!important;flex:1 1 auto!important;}" +
        ".ccfl-event-title-wrap .mpp-innerpage--subtitle{margin:0!important;color:#000!important;font-size:clamp(20px,3.2vw,34px)!important;line-height:1.2!important;font-weight:700!important;display:-webkit-box!important;-webkit-box-orient:vertical!important;-webkit-line-clamp:2!important;overflow:hidden!important;text-overflow:ellipsis!important;}" +
        ".mpp-innerpage--datetime{display:none!important;}" +
        "@media screen and (max-width:767px){.ccfl-event-headline{gap:10px!important;}.ccfl-event-date-month{font-size:10px!important;}.ccfl-event-date-day{font-size:20px!important;}.ccfl-event-title-wrap .mpp-innerpage--subtitle{font-size:clamp(18px,6vw,24px)!important;}}";

      root.appendChild(style);
    }

    function replaceBackLink(root) {
      if (!root) {
        return false;
      }

      injectShadowStyle(root);

      var oldHeading = root.querySelector("h3.mpp-innerpage--back");
      if (!oldHeading) {
        return false;
      }

      if (oldHeading.classList.contains(CUSTOM_CLASS)) {
        return true;
      }

      var oldAnchor = oldHeading.querySelector("a");
      var href =
        (oldAnchor && oldAnchor.getAttribute("href")) || "/event-finder";

      var newHeading = document.createElement("h3");
      newHeading.className = "mpp-innerpage--back " + CUSTOM_CLASS;

      var newAnchor = document.createElement("a");
      newAnchor.setAttribute("href", href);
      newAnchor.setAttribute("aria-label", "All Events");

      var icon = document.createElement("i");
      icon.className = "mppw-arrow back";

      var label = document.createElement("span");
      label.className = "ccfl-back-label";
      label.textContent = "All Events";

      newAnchor.appendChild(icon);
      newAnchor.appendChild(label);
      newHeading.appendChild(newAnchor);

      oldHeading.parentNode.replaceChild(newHeading, oldHeading);
      return true;
    }

    function getDateParts(rangeText) {
      var fallback = { month: "TBD", day: "--" };
      if (!rangeText) {
        return fallback;
      }

      var match = rangeText.match(/,\s*([A-Za-z]{3,})\s+(\d{1,2}),/);
      if (match) {
        return {
          month: match[1].slice(0, 3).toUpperCase(),
          day: match[2],
        };
      }

      var firstHalf = rangeText.split(" - ")[0] || rangeText;
      var date = new Date(firstHalf);
      if (!isNaN(date.getTime())) {
        var months = [
          "JAN",
          "FEB",
          "MAR",
          "APR",
          "MAY",
          "JUN",
          "JUL",
          "AUG",
          "SEP",
          "OCT",
          "NOV",
          "DEC",
        ];

        return {
          month: months[date.getMonth()],
          day: String(date.getDate()),
        };
      }

      return fallback;
    }

    function formatEventHeadline(root) {
      if (!root) {
        return false;
      }

      injectShadowStyle(root);

      var section = root.querySelector("section.mpp-innerpage");
      if (!section) {
        return false;
      }

      var title = section.querySelector("h1.mpp-innerpage--subtitle");
      var dateRange = section.querySelector(".event-date-range");
      if (!title || !dateRange) {
        return false;
      }

      var dateParts = getDateParts((dateRange.textContent || "").trim());
      var headline = section.querySelector(".ccfl-event-headline");

      if (!headline) {
        headline = document.createElement("div");
        headline.className = "ccfl-event-headline";

        var badge = document.createElement("div");
        badge.className = "ccfl-event-date-badge";

        var month = document.createElement("span");
        month.className = "ccfl-event-date-month";

        var day = document.createElement("span");
        day.className = "ccfl-event-date-day";

        badge.appendChild(month);
        badge.appendChild(day);

        var titleWrap = document.createElement("div");
        titleWrap.className = "ccfl-event-title-wrap";

        headline.appendChild(badge);
        headline.appendChild(titleWrap);

        var anchorPoint = section.querySelector(
          ".mpp-innerpage--fixed-imgcontainer",
        );
        if (anchorPoint && anchorPoint.nextSibling) {
          section.insertBefore(headline, anchorPoint.nextSibling);
        } else {
          section.insertBefore(headline, title);
        }
      }

      var monthEl = headline.querySelector(".ccfl-event-date-month");
      var dayEl = headline.querySelector(".ccfl-event-date-day");
      var titleWrapEl = headline.querySelector(".ccfl-event-title-wrap");

      if (monthEl) {
        monthEl.textContent = dateParts.month;
      }

      if (dayEl) {
        dayEl.textContent = dateParts.day;
      }

      if (titleWrapEl && title.parentNode !== titleWrapEl) {
        titleWrapEl.appendChild(title);
      }

      var oldDateContainer = section.querySelector(".mpp-innerpage--datetime");
      if (oldDateContainer) {
        oldDateContainer.remove();
      }

      return true;
    }

    function watchRoot(root) {
      if (!root || root.__ccflBackLinkObserver) {
        return;
      }

      var observer = new MutationObserver(function () {
        replaceBackLink(root);
        formatEventHeadline(root);
      });

      observer.observe(root, { childList: true, subtree: true });
      root.__ccflBackLinkObserver = observer;
    }

    function processHost(host) {
      if (!host) {
        return;
      }

      var root = host.shadowRoot || host.__ccflShadowRoot;
      if (!root) {
        return;
      }

      replaceBackLink(root);
      formatEventHeadline(root);
      watchRoot(root);
    }

    var originalAttachShadow = Element.prototype.attachShadow;
    Element.prototype.attachShadow = function (init) {
      var root = originalAttachShadow.call(this, init);
      this.__ccflShadowRoot = root;
      processHost(this);
      return root;
    };

    function boot() {
      var hosts = document.querySelectorAll(HOST_SELECTOR);
      for (var i = 0; i < hosts.length; i++) {
        processHost(hosts[i]);
      }
    }

    var hostObserver = new MutationObserver(function () {
      boot();
    });

    hostObserver.observe(document.documentElement, {
      childList: true,
      subtree: true,
    });

    var retries = 0;
    var interval = setInterval(function () {
      boot();
      retries += 1;
      if (retries > 40) {
        clearInterval(interval);
      }
    }, 250);

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", boot);
    } else {
      boot();
    }
  })();
</script>

  window.isLoginFlowCompleted = false;
  function redirectAfterLoginHandler() {
    const redirectUrl = localStorage.getItem("redirectAfterLogin");

    if (redirectUrl) {
      localStorage.removeItem("redirectAfterLogin");

      // prevent multiple redirects
      if (!window.redirectInProgress) {
        window.redirectInProgress = true;

        setTimeout(() => {
          window.location.href = redirectUrl;
        }, 300);
      }
    }
  }

  $(document).on("mfpClose", function () {
    const loginTitle = document.querySelector(".login-title");
    if (!loginTitle) return;
    console.log("modal closing check");

    if (!window.isLoginFlowCompleted) {
      localStorage.removeItem("redirectAfterLogin");

      const redirectAfterLogin = localStorage.getItem("redirectAfterLogin");
      const showRedirectMessage = Boolean(redirectAfterLogin);
      loginTitle.textContent = redirectAfterLogin
        ? "The content you requested requires a login. Please login to continue."
        : "Welcome!";

      loginTitle.style.fontSize = showRedirectMessage ? "32px" : "40px";
      loginTitle.style.lineHeight = showRedirectMessage ? "1.2" : "";
    }

    //   Check if user is logged in
    const token = localStorage.getItem("mpp-widgets_AuthToken");

    if (token) {
      redirectAfterLoginHandler();
    }
  });

<script>
  (function () {
    // console.log("[vm-tip] delegated script loaded");

    function positionTip(tip) {
      tip.classList.remove(
        "vm-tip-top",
        "vm-tip-bottom",
        "vm-tip-left",
        "vm-tip-right",
      );
      tip.style.setProperty("--vm-tip-shift", "0px");

      var rect = tip.getBoundingClientRect();
      var viewportHeight =
        window.innerHeight || document.documentElement.clientHeight;
      var viewportWidth =
        window.innerWidth || document.documentElement.clientWidth;

      var tooltipHeight = 76;
      var gap = 10;
      var minSpace = tooltipHeight + gap;
      var tooltipWidth = Math.min(260, viewportWidth * 0.9);
      var safePadding = 8;

      var spaceTop = rect.top;
      var spaceBottom = viewportHeight - rect.bottom;
      var centerX = rect.left + rect.width / 2;

      if (spaceTop >= minSpace || spaceTop >= spaceBottom) {
        tip.classList.add("vm-tip-top");
        // console.log("[vm-tip] TOP", {
        //   spaceTop: spaceTop,
        //   spaceBottom: spaceBottom,
        // });
      } else {
        tip.classList.add("vm-tip-bottom");
        // console.log("[vm-tip] BOTTOM", {
        //   spaceTop: spaceTop,
        //   spaceBottom: spaceBottom,
        // });
      }

      var overflowLeft = safePadding - (centerX - tooltipWidth / 2);
      var overflowRight =
        centerX + tooltipWidth / 2 - (viewportWidth - safePadding);

      if (overflowLeft > 0) {
        tip.style.setProperty("--vm-tip-shift", overflowLeft + "px");
      } else if (overflowRight > 0) {
        tip.style.setProperty("--vm-tip-shift", -overflowRight + "px");
      }
    }

    function activateTip(tip, source) {
      positionTip(tip);
      tip.classList.add("vm-tip-active");
      // console.log("[vm-tip] active via", source);
    }

    function deactivateTip(tip, source) {
      tip.classList.remove("vm-tip-active");
      // console.log("[vm-tip] inactive via", source);
    }

    // Mouse hover (delegated)
    document.addEventListener("mouseover", function (e) {
      var tip = e.target.closest(".vm-tip");
      if (!tip) return;
      activateTip(tip, "mouseover");
    });

    document.addEventListener("mouseout", function (e) {
      var tip = e.target.closest(".vm-tip");
      if (!tip) return;
      // Ignore moving inside same tooltip element
      if (tip.contains(e.relatedTarget)) return;
      deactivateTip(tip, "mouseout");
    });

    // Keyboard focus (delegated)
    document.addEventListener("focusin", function (e) {
      var tip = e.target.closest(".vm-tip");
      if (!tip) return;
      activateTip(tip, "focusin");
    });

    document.addEventListener("focusout", function (e) {
      var tip = e.target.closest(".vm-tip");
      if (!tip) return;
      if (tip.contains(e.relatedTarget)) return;
      deactivateTip(tip, "focusout");
    });

    // Touch support (delegated)
    document.addEventListener(
      "touchstart",
      function (e) {
        var tip = e.target.closest(".vm-tip");
        if (!tip) return;
        activateTip(tip, "touchstart");
      },
      { passive: true },
    );

    // Reposition active tooltips on viewport changes
    function updateActiveTips() {
      var activeTips = document.querySelectorAll(".vm-tip.vm-tip-active");
      for (var i = 0; i < activeTips.length; i++) {
        positionTip(activeTips[i]);
      }
    }

    window.addEventListener("resize", updateActiveTips);
    window.addEventListener("scroll", updateActiveTips, { passive: true });

    // Debug heartbeat to confirm widget is eventually rendered
    setInterval(function () {
      var count = document.querySelectorAll(".vm-tip").length;
      // console.log("[vm-tip] current count:", count);
    }, 3000);
  })();
</script>

<script>
  (function () {
    function removeTapTip() {
      var current = document.getElementById("cvas-mobile-tooltip");
      if (current) {
        current.remove();
      }
    }

    function showTapTip(target, text) {
      removeTapTip();

      var tip = document.createElement("div");
      tip.id = "cvas-mobile-tooltip";
      tip.className = "cvas-mobile-tooltip";
      tip.textContent = text;
      document.body.appendChild(tip);

      var rect = target.getBoundingClientRect();
      var tipRect = tip.getBoundingClientRect();
      var vw = window.innerWidth || document.documentElement.clientWidth;
      var vh = window.innerHeight || document.documentElement.clientHeight;
      var gap = 10;
      var pad = 8;

      var left = rect.left + rect.width / 2 - tipRect.width / 2;
      if (left < pad) left = pad;
      if (left + tipRect.width > vw - pad) left = vw - pad - tipRect.width;

      var showAbove = rect.top >= tipRect.height + gap + pad;
      var top = showAbove ? rect.top - tipRect.height - gap : rect.bottom + gap;

      if (top + tipRect.height > vh - pad) {
        top = vh - pad - tipRect.height;
      }
      if (top < pad) {
        top = pad;
      }

      tip.style.left = left + "px";
      tip.style.top = top + "px";
      tip.classList.add(showAbove ? "tip-top" : "tip-bottom");
    }

    function getTipText(target) {
      var text = target.getAttribute("data-native-tip");
      if (text) {
        return text;
      }

      text = target.getAttribute("title");
      if (text) {
        target.setAttribute("data-native-tip", text);
        target.setAttribute("aria-label", text);
        target.removeAttribute("title");
      }
      return text;
    }

    function activateTip(target) {
      var text = getTipText(target);
      if (!text) return;
      showTapTip(target, text);
    }

    document.addEventListener("mouseover", function (e) {
      var target = e.target.closest(".cvas-native-tip");
      if (!target) return;
      activateTip(target);
    });

    document.addEventListener("mouseout", function (e) {
      var target = e.target.closest(".cvas-native-tip");
      if (!target) return;
      if (target.contains(e.relatedTarget)) return;
      removeTapTip();
    });

    document.addEventListener("focusin", function (e) {
      var target = e.target.closest(".cvas-native-tip");
      if (!target) return;
      activateTip(target);
    });

    document.addEventListener("focusout", function (e) {
      var target = e.target.closest(".cvas-native-tip");
      if (!target) return;
      if (target.contains(e.relatedTarget)) return;
      removeTapTip();
    });

    document.addEventListener(
      "click",
      function (e) {
        var target = e.target.closest(".cvas-native-tip");
        if (!target) {
          removeTapTip();
          return;
        }

        activateTip(target);

        setTimeout(removeTapTip, 2200);
      },
      true,
    );

    window.addEventListener("scroll", removeTapTip, { passive: true });
    window.addEventListener("resize", removeTapTip);
  })();
</script>
<script>
  jQuery(function ($) {
    var $accordion = $("#my_events_list_accordion");
    if (!$accordion.length) return;

    // Ensure initial display matches classes
    $accordion.find(".et_pb_toggle").each(function () {
      var $t = $(this);
      var $c = $t.find(".et_pb_toggle_content").first();
      if ($t.hasClass("et_pb_toggle_open")) $c.show();
      else $c.hide();
    });

    // Remove any previous handlers added by this script to avoid duplicates
    $accordion.off("click.myAccordion", ".et_pb_toggle_title");

    $accordion.on("click.myAccordion", ".et_pb_toggle_title", function (e) {
      e.preventDefault();
      e.stopImmediatePropagation();

      // ignore clicks on interactive children
      if (
        $(e.target).closest(
          'a, button, input, textarea, label, [role="button"]',
        ).length
      )
        return;

      var $title = $(this);
      var $toggle = $title.closest(".et_pb_toggle");
      var $content = $toggle.find(".et_pb_toggle_content").first();

      // guard: don't re-run while animating
      if ($toggle.hasClass("animating")) return;

      // mark animating on this toggle (and optionally on accordion)
      $toggle.addClass("animating");

      if ($toggle.hasClass("et_pb_toggle_open")) {
        // close this
        $content.stop(true, true).slideUp(400, function () {
          $toggle
            .removeClass("et_pb_toggle_open")
            .addClass("et_pb_toggle_close")
            .removeClass("animating");
        });
      } else {
        // close others first
        $accordion.find(".et_pb_toggle.et_pb_toggle_open").each(function () {
          var $other = $(this);
          var $otherContent = $other.find(".et_pb_toggle_content").first();
          if ($other.is($toggle)) return;
          $other.addClass("animating");
          $otherContent.stop(true, true).slideUp(400, function () {
            $other
              .removeClass("et_pb_toggle_open")
              .addClass("et_pb_toggle_close")
              .removeClass("animating");
          });
        });

        // open clicked one
        $content.stop(true, true).slideDown(400, function () {
          $toggle
            .removeClass("et_pb_toggle_close")
            .addClass("et_pb_toggle_open")
            .removeClass("animating");
        });
      }
    });
  });
</script>

    const sundayEnd = now.set({ hour: 12, minute: 15 });
    //     const adhocStart = now.set({ hour: 8, minute: 45 });
    //     const adhocEnd = now.set({ hour: 12, minute: 00 });

    // Determine visibility
    const showSaturday =
      day === 6 && now >= saturdayStart && now <= saturdayEnd;
    const showSunday = day === 7 && now >= sundayStart && now <= sundayEnd;
    // 	const showAdhoc = day === 3 && now >= adhocStart && now <= adhocEnd;

    // 	const showAdhoc = day >= 1 && day <= 6; // Monday–Saturday all day

    saturdayContainer.style.display = showSaturday ? "block" : "none";
    //     sundayContainer.style.display = showSunday ? "block" : "none";
    sundayContainer.forEach(
      (el) => (el.style.display = showSunday ? "block" : "none"),
    );
    // 	adhocContainer.style.display = showAdhoc ? "block" : "none";
  });
</script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    let isDragging = false;

    // Select all popups (or adjust this to a specific one)
    const popups = document.querySelectorAll(".dsm-popup");

    if (popups.length === 0) return;

    popups.forEach((popup) => {
      // When user starts dragging inside the popup
      popup.addEventListener("mousedown", () => {
        isDragging = true;
      });
    });

    // When mouse is released, stop dragging after short delay
    document.addEventListener("mouseup", () => {
      setTimeout(() => {
        isDragging = false;
      }, 100);
    });

    // Prevent ONLY outside clicks during drag
    document.addEventListener(
      "click",
      function (e) {
        if (isDragging) {
          // Check if the click is outside all popups
          let clickedInsidePopup = false;
          popups.forEach((popup) => {
            if (popup.contains(e.target)) {
              clickedInsidePopup = true;
            }
          });

          // If clicked outside while dragging, stop it
          if (!clickedInsidePopup) {
            e.stopImmediatePropagation();
            e.preventDefault();
          }
        }
      },
      true,
    ); // Capture phase
  });
</script>
